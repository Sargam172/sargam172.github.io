<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Intersecting Planes – Creative Demo</title>
    <script src="../js/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Camera with full W-A-S-D movement + mouse/VR look controls -->
      <a-entity camera="wasd-controls; look-controls" position="0 3 9"></a-entity>

      <!-- Lighting for dramatic effect -->
      <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
      <a-light type="directional" color="#ffddaa" intensity="1.3" position="5 8 6"></a-light>

      <!-- FLOOR PLANE (red) – static base -->
      <a-plane position="0 0 -4" 
               rotation="-90 0 0" 
               width="12" 
               height="12" 
               color="#FF4444"
               shadow="receive: true"></a-plane>

      <!-- GREEN PLANE – tilted + spinning animation -->
      <a-plane id="green-plane"
               position="0 1 -4" 
               rotation="-45 0 0" 
               width="10" 
               height="10" 
               color="#44FF66"
               transparent="true"
               opacity="0.75"
               metalness="0.1"
               roughness="0.3"
               shadow="receive: true">
        <!-- Slow rotation around Y axis (creates constantly changing intersections) -->
        <a-animation attribute="rotation" 
                     to=" -45 360 0" 
                     dur="15000" 
                     repeat="indefinite" 
                     easing="linear"></a-animation>
      </a-plane>

      <!-- BLUE PLANE – opposite tilt + faster spin -->
      <a-plane id="blue-plane"
               position="0 1 -4" 
               rotation="45 0 0" 
               width="10" 
               height="10" 
               color="#4488FF"
               transparent="true"
               opacity="0.75"
               metalness="0.1"
               roughness="0.3"
               shadow="receive: true">
        <!-- Faster rotation in opposite direction -->
        <a-animation attribute="rotation" 
                     to="45 -360 0" 
                     dur="9000" 
                     repeat="indefinite" 
                     easing="linear"></a-animation>
      </a-plane>

      <!-- Central glowing orb where all planes intersect (very cool visual) -->
      <a-sphere position="0 1 -4" 
                radius="0.6" 
                color="#FFFF88" 
                emissive="#FFEE44" 
                emissive-intensity="0.6"
                metalness="0.9"
                roughness="0.1"
                shadow="cast: true">
        <!-- Gentle pulsing animation -->
        <a-animation attribute="scale" 
                     to="1.3 1.3 1.3" 
                     dur="1200" 
                     repeat="indefinite" 
                     direction="alternate" 
                     easing="ease-in-out"></a-animation>
      </a-sphere>

      <!-- Dramatic space-like sky -->
      <a-sky color="#0A0A2A"></a-sky>

      <!-- Fog for depth and atmosphere -->
      <a-entity fog="type: exponential; color: #0A0A2A; density: 0.025"></a-entity>

      <!-- Title -->
      <a-text value="Creative Intersecting Planes"
              position="0 5 -7"
              align="center"
              color="#FFFFFF"
              scale="2 2 2"></a-text>

      <!-- Subtitle -->
      <a-text value="Watch the planes spin and blend colors where they intersect!"
              position="0 4 -7"
              align="center"
              color="#AAAAFF"
              scale="1 1 1"></a-text>

      <!-- Controls reminder -->
      <a-text value="WASD = move • Mouse = look • VR Mini = head tracking"
              position="0 1 -8"
              align="center"
              color="#FFFFFF"
              scale="0.7 0.7 0.7"></a-text>
    </a-scene>
  </body>
</html>
