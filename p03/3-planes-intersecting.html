<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Intersecting Planes – Creative Neon Demo</title>
    <script src="../js/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Camera with full W-A-S-D movement + mouse/VR look controls -->
      <a-entity camera="wasd-controls; look-controls" position="0 3 9"></a-entity>

      <!-- Dramatic neon lighting -->
      <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
      <a-light type="directional" color="#aaffff" intensity="1.4" position="5 8 6"></a-light>

      <!-- FLOOR PLANE (deep neon purple) -->
      <a-plane position="0 0 -4" 
               rotation="-90 0 0" 
               width="12" 
               height="12" 
               color="#4B0082"
               shadow="receive: true"></a-plane>

      <!-- CYAN PLANE – spinning + color-cycling animation -->
      <a-plane id="cyan-plane"
               position="0 1 -4" 
               rotation="-45 0 0" 
               width="10" 
               height="10" 
               color="#00FFFF"
               transparent="true"
               opacity="0.78"
               metalness="0.2"
               roughness="0.2"
               shadow="receive: true">
        <!-- Spin -->
        <a-animation attribute="rotation" 
                     to="-45 360 0" 
                     dur="14000" 
                     repeat="indefinite" 
                     easing="linear"></a-animation>
        <!-- Color cycling (neon rainbow effect) -->
        <a-animation attribute="color" 
                     from="#00FFFF" 
                     to="#FF00FF" 
                     dur="4000" 
                     repeat="indefinite" 
                     direction="alternate" 
                     easing="ease-in-out"></a-animation>
      </a-plane>

      <!-- MAGENTA PLANE – opposite spin + different color cycle -->
      <a-plane id="magenta-plane"
               position="0 1 -4" 
               rotation="45 0 0" 
               width="10" 
               height="10" 
               color="#FF00FF"
               transparent="true"
               opacity="0.78"
               metalness="0.2"
               roughness="0.2"
               shadow="receive: true">
        <!-- Opposite spin -->
        <a-animation attribute="rotation" 
                     to="45 -360 0" 
                     dur="9000" 
                     repeat="indefinite" 
                     easing="linear"></a-animation>
        <!-- Color cycling -->
        <a-animation attribute="color" 
                     from="#FF00FF" 
                     to="#00FFAA" 
                     dur="3500" 
                     repeat="indefinite" 
                     direction="alternate" 
                     easing="ease-in-out"></a-animation>
      </a-plane>

      <!-- Glowing central orb (bright white-cyan with pulse) -->
      <a-sphere position="0 1 -4" 
                radius="0.65" 
                color="#CCFFFF" 
                emissive="#00FFFF" 
                emissive-intensity="0.9"
                metalness="0.95"
                roughness="0.05"
                shadow="cast: true">
        <a-animation attribute="scale" 
                     to="1.35 1.35 1.35" 
                     dur="1100" 
                     repeat="indefinite" 
                     direction="alternate" 
                     easing="ease-in-out"></a-animation>
      </a-sphere>

      <!-- Deep neon space sky -->
      <a-sky color="#1A0033"></a-sky>

      <!-- Fog for extra depth -->
      <a-entity fog="type: exponential; color: #1A0033; density: 0.028"></a-entity>

      <!-- Title -->
      <a-text value="Creative Intersecting Planes"
              position="0 5.2 -7"
              align="center"
              color="#FFFFFF"
              scale="2.1 2.1 2.1"></a-text>

      <!-- Subtitle -->
      <a-text value="Neon planes spin + colors shift live!"
              position="0 4.1 -7"
              align="center"
              color="#00FFFF"
              scale="1.1 1.1 1.1"></a-text>

      <!-- Controls reminder -->
      <a-text value="WASD = move • Mouse = look • VR Mini = head tracking"
              position="0 1 -8"
              align="center"
              color="#FFFFFF"
              scale="0.75 0.75 0.75"></a-text>
    </a-scene>
  </body>
</html>
