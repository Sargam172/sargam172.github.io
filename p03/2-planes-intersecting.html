<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Two intersecting planes - Enhanced</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Green plane with texture and animation -->
      <a-plane position="0 1 -4" rotation="-45 0 0" width="4" height="4" color="green" opacity="0.9">
        <a-animation attribute="rotation"
                     from="-45 0 0"
                     to="-45 360 0"
                     dur="8000"
                     repeat="indefinite"
                     easing="linear"></a-animation>
        <a-animation attribute="color"
                     from="green"
                     to="lightgreen"
                     dur="3000"
                     direction="alternate"
                     repeat="indefinite"></a-animation>
      </a-plane>
      
      <!-- Blue plane with opposite rotation and animation -->
      <a-plane position="0 1 -4" rotation="45 0 0" width="4" height="4" color="blue" opacity="0.9">
        <a-animation attribute="rotation"
                     from="45 0 0"
                     to="45 360 0"
                     dur="8000"
                     repeat="indefinite"
                     easing="linear"></a-animation>
        <a-animation attribute="color"
                     from="blue"
                     to="lightblue"
                     dur="3000"
                     direction="alternate"
                     repeat="indefinite"></a-animation>
      </a-plane>
      
      <!-- Add a sphere in the center where planes intersect -->
      <a-sphere position="0 1 -4" radius="0.4" color="gold">
        <a-animation attribute="scale"
                     from="1 1 1"
                     to="1.3 1.3 1.3"
                     dur="1000"
                     direction="alternate"
                     repeat="indefinite"></a-animation>
      </a-sphere>
      
      <!-- Lighting for better visibility -->
      <a-light type="ambient" intensity="0.5" color="#ffffff"></a-light>
      <a-light type="point" intensity="1.2" position="2 5 3" color="#ffaa88"></a-light>
      <a-light type="point" intensity="0.8" position="-2 3 2" color="#88aaff"></a-light>
      
      <!-- Camera with WASD controls for VR Mini -->
      <a-entity camera="wasd-controls; look-controls" position="0 2 6"></a-entity>
      
      <!-- Ground reference grid -->
      <a-entity position="0 -1 -4">
        <a-grid helper="grid" size="10" divisions="10" color="#888888"></a-grid>
      </a-entity>
      
      <!-- Text label explaining what's happening -->
      <a-text value="Intersecting Planes - Rotating 360°"
              position="0 3.5 -4"
              align="center"
              color="#ffffff"
              width="5"
              scale="0.8 0.8 0.8">
      </a-text>
      
      <a-text value="Green (-45°) + Blue (+45°) = X Shape"
              position="0 2.5 -4"
              align="center"
              color="#cccccc"
              width="5"
              scale="0.6 0.6 0.6">
      </a-text>
      
      <!-- Background sky -->
      <a-sky color="#111122"></a-sky>
      
      <!-- Subtle fog for depth -->
      <a-entity fog="type: linear; color: #111122; near: 5; far: 15"></a-entity>
    </a-scene>
  </body>
</html>
