<!DOCTYPE html>
<html>
  <head>
    <script src="../js/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Camera - move with WASD, look with mouse or VR Mini -->
      <a-entity camera="wasd-controls; look-controls" position="0 2.5 9"></a-entity>

      <!-- Lighting for glowing additive effect -->
      <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
      <a-light type="directional" color="#ff88cc" intensity="1.5" position="5 8 6"></a-light>

      <!-- LARGE RED BOX (additive + rotating + color pulse) -->
      <a-box id="PGB-box-red"
             width="3" depth="3" height="3"
             position="0 2 -6"
             rotation="45 0 0"
             color="#FF3366"
             transparent="true"
             opacity="0.85"
             blending="additive"
             metalness="0.2"
             roughness="0.3"
             shadow="receive: true">
        <a-animation attribute="rotation" to="405 0 0" dur="18000" repeat="indefinite" easing="linear"></a-animation>
        <a-animation attribute="color" from="#FF3366" to="#FF88FF" dur="3000" repeat="indefinite" direction="alternate" easing="ease-in-out"></a-animation>
      </a-box>

      <!-- SMALL BLUE BOX (offset so you can see the overlap glow) -->
      <a-box id="PGB-box-blue"
             position="0.4 2 -6"
             rotation="0 45 0"
             color="#00CCFF"
             transparent="true"
             opacity="0.8"
             blending="additive"
             metalness="0.3"
             roughness="0.3"
             shadow="receive: true">
        <a-animation attribute="rotation" to="0 405 0" dur="10000" repeat="indefinite" easing="linear"></a-animation>
        <a-animation attribute="scale" to="1.35 1.35 1.35" dur="1600" repeat="indefinite" direction="alternate" easing="ease-in-out"></a-animation>
      </a-box>

      <!-- Floor -->
      <a-plane position="0 0 -6" rotation="-90 0 0" width="16" height="16" color="#112233" shadow="receive: true"></a-plane>

      <!-- Dark futuristic sky -->
      <a-sky color="#0F001F"></a-sky>

      <!-- Fog for depth -->
      <a-entity fog="type: exponential; color: #0F001F; density: 0.028"></a-entity>

      <!-- Title -->
      <a-text value="Additive Blending Boxes Demo" 
              position="0 6 -8" 
              align="center" 
              color="#FFFFFF" 
              scale="2.2 2.2 2.2"></a-text>

      <a-text value="Watch the glowing overlap as they spin!"
              position="0 4.5 -8" 
              align="center" 
              color="#88FFFF" 
              scale="1.1 1.1 1.1"></a-text>
    </a-scene>
  </body>
</html>
