<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Camera with WASD + mouse/VR look controls (required for VR Mini + desktop) -->
      <a-entity camera="wasd-controls; look-controls" position="0 1.6 5"></a-entity>

      <!-- Better lighting -->
      <a-light type="ambient" color="#445566" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffddaa" intensity="1.2" position="5 10 5" cast-shadow="true"></a-light>

      <!-- Improved primitives with animations -->
      <a-box id="box" 
             position="-1 0.5 -3" 
             rotation="0 45 0" 
             color="#4CC3D9"
             width="1.5" height="1.5" depth="1.5"
             shadow="receive: true">
        <a-animation attribute="rotation" 
                     to="0 405 0" 
                     dur="8000" 
                     repeat="indefinite" 
                     easing="linear"></a-animation>
      </a-box>

      <a-sphere id="sphere" 
                position="0 1.25 -5" 
                radius="1.25" 
                color="#EF2D5E"
                shadow="receive: true">
        <a-animation attribute="rotation" 
                     to="360 0 0" 
                     dur="6000" 
                     repeat="indefinite" 
                     easing="linear"></a-animation>
      </a-sphere>

      <a-cylinder id="cylinder" 
                  position="1 0.75 -3" 
                  radius="0.5" 
                  height="1.5" 
                  color="#FFC65D"
                  shadow="receive: true">
        <a-animation attribute="rotation" 
                     to="0 0 360" 
                     dur="7000" 
                     repeat="indefinite" 
                     easing="linear"></a-animation>
      </a-cylinder>

      <!-- Ground plane with better color + shadow receiver -->
      <a-plane position="0 0 -4" 
               rotation="-90 0 0" 
               width="12" 
               height="12" 
               color="#2C5F4A"
               shadow="receive: true"></a-plane>

      <!-- Beautiful 360° sky (kept your original, but added fog for depth) -->
      <a-sky src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Rainbow_on_the_Azores_%E2%80%93_360%C2%B0_drone_shot.jpg"></a-sky>

      <!-- Optional: subtle fog for more immersive 3D feel -->
      <a-entity fog="type: linear; color: #112233; near: 2; far: 25"></a-entity>

      <!-- Simple title text (nice touch for assignment demo) -->
      <a-text value="A-Frame Basic Shapes + Animation" 
              position="0 3 -4" 
              align="center" 
              color="#FFFFFF" 
              scale="1.5 1.5 1.5"></a-text>
    </a-scene>
  </body>
</html>
