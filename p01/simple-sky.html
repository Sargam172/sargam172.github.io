<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Simple working sky color instead of image -->
      <a-sky color="#0a0a2a"></a-sky>
      
      <!-- Camera -->
      <a-entity camera="wasd-controls; look-controls" position="0 3 12"></a-entity>
      
      <!-- Lights -->
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="point" intensity="1.5" position="0 5 0"></a-light>
      
      <!-- Star -->
      <a-sphere position="0 4 -9" radius="5" color="#FFEE77" emissive="#FFAA00" emissive-intensity="2">
        <a-animation attribute="rotation" to="0 360 0" dur="28000" repeat="indefinite"></a-animation>
        <a-animation attribute="scale" from="1 1 1" to="1.12 1.12 1.12" dur="1600" repeat="indefinite" direction="alternate"></a-animation>
      </a-sphere>
      
      <!-- Text -->
      <a-text value="SARGAM" position="0 4 -4" color="#FFFF00" scale="2 2 2"></a-text>
      <a-text value="Nebula Star" position="0 2 -4" color="#FFDD77"></a-text>
    </a-scene>
  </body>
</html>
